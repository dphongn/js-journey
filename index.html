<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knight HP Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <h1>🗡️ Hiệp Sĩ Rồng 🛡️</h1>
        
        <div class="hp-box">
            <p>Sinh lực: <span id="hp-text">100</span> / 100</p>
            <div class="hp-bar-container">
                <div id="hp-bar-fill"></div>
            </div>
            <p id="status-effect" class="hidden">🤢 Đang trúng độc (-5 HP/s)</p>
        </div>

        <div class="controls">
            <button id="btn-attack">⚔️ Nhận Sát Thương (-15)</button>
            <p id="skill-desc" style="color: #f39c12; height: 20px; margin-top: 10px; font-style: italic;"></p>
            <button id="btn-heal">🧪 Uống Bình Máu (+20 & Giải Độc)</button>
            <p id="skill-desc" style="color: #f39c12; height: 20px; margin-top: 10px; font-style: italic;"></p>
            <button id="btn-poison">☠️ Trúng Độc (-5/s)</button>
            <p id="skill-desc" style="color: #f39c12; height: 20px; margin-top: 10px; font-style: italic;"></p>
        </div>

        <div style="margin-top: 15px;">
            <label>Niệm chú: </label>
            <input type="text" id="spell-input" placeholder="Gõ FIREBALL...">
        </div>        

        <h2 id="game-over-text" class="hidden">💀 GAME OVER 💀</h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
